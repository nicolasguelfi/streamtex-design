# Pre-commit hooks for streamtex-design.
#
# Install once with:
#   pip install pre-commit
#   pre-commit install
#
# Then ruff + pytest run automatically before each commit.
# Bypass with `git commit --no-verify` (not recommended).

repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: uv run ruff check streamtex_design tests
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -q
        language: system
        pass_filenames: false
        always_run: true
