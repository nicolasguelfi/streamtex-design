name: test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  test:
    name: pytest + ruff + stx validate
    runs-on: ubuntu-latest
    env:
      UV_NO_SOURCES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install streamtex-design with dev dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check streamtex_design tests

      - name: Pytest
        run: uv run pytest tests/ -v

      - name: stx validate
        run: uv run stx validate
