name: test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  test:
    name: pytest + ruff + stx validate
    runs-on: ubuntu-latest
    env:
      UV_NO_SOURCES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install streamtex-design with dev dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check streamtex_design tests

      - name: Pytest
        run: uv run pytest tests/ -v

      - name: stx validate (warnings tolerated, errors fail)
        # PLAN §7.5: exit 0 = OK, 1 = warnings, 2 = errors.
        # CI tolerates warnings (cosmetic / non-blocking) but fails on errors.
        run: |
          set +e
          uv run stx validate
          code=$?
          set -e
          if [ "$code" -ge 2 ]; then
            echo "stx validate exited with $code (errors) — failing CI"
            exit "$code"
          fi
          echo "stx validate exited with $code (OK or warnings) — CI tolerates"
